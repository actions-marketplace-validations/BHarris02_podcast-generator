name: "Podcast generator - BHarris02"
author: "Blake Harris"
description: "From LinkedIn Learning"
runs:
  using: "docker"
  image: "Dockerfile"
branding:
  icon: "git-branch"
  color: "red"
inputs:
  email: 
    description: Committer's email address
    required: true
    default: ${{ github.actor }}@localhost
  name:     
    description: Committer's name
    required: true
    default: ${{ github.actor }}
